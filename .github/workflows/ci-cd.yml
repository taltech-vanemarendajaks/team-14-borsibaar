name: Build and Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      SSH_USER: ${{ secrets.SSH_USER }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      SERVER_IP: ${{ secrets.SERVER_IP }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      IMAGE_BACKEND: ${{ secrets.DOCKERHUB_USERNAME }}/borsibaar-service
      IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/borsibaar-frontend
      APP_URL: https://borsibaar.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build backend
        working-directory: backend
        run: ./mvnw clean package -DskipTests

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        run: |
          echo "TAG=$(grep '^appVersion:' helm/borsibaar-app/Chart.yaml | sed 's/appVersion: *"//' | sed 's/"//')" >> $GITHUB_ENV

      - name: Check if image tag already exists
        run: |
          TOKEN=$(curl -s -H "Content-Type: application/json" \
            -d '{"username": "${{ env.DOCKERHUB_USERNAME }}", "password": "${{ env.DOCKERHUB_TOKEN }}"}' \
            https://hub.docker.com/v2/users/login | jq -r .token)

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $TOKEN" \
            https://hub.docker.com/v2/repositories/${{ env.DOCKERHUB_USERNAME }}/borsibaar-service/tags/${{ env.TAG }})

          if [ "$STATUS" = "200" ]; then
            echo "Image tag ${{ env.TAG }} already exists. Skipping build."
            exit 1
          fi

      - name: Build & push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:${{ env.TAG }}

      - name: Build & push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:${{ env.TAG }}
          build-args: |
            NEXT_PUBLIC_BACKEND_URL=${{ env.APP_URL }}

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan "$SERVER_IP" >> ~/.ssh/known_hosts

      - name: Copy deployment package to server
        run: |
          scp -r -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=yes \
            ./helm/borsibaar-app \
            "$SSH_USER@$SERVER_IP:/home/ubuntu/"

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SERVER_IP" << EOF
          set -e

          export KUBECONFIG=/home/ubuntu/.kube/config

          helm upgrade --install borsibaar-app ./borsibaar-app

          EOF

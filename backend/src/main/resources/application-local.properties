spring.datasource.url=jdbc:postgresql://localhost:5432/borsibaar
spring.datasource.username=postgres
spring.datasource.password=postgres

jwt.secret=${JWT_SECRET:change-me-in-local-env}
debug.auto.login=${DEBUG_AUTO_LOGIN_ENABLED:false}
debug.auto-login.email=${DEBUG_AUTO_LOGIN_EMAIL:debug@example.com}
debug.auto-login.name=${DEBUG_AUTO_LOGIN_NAME:Debug User}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000}
app.frontend.url=${APP_FRONTEND_URL:http://localhost:3000}

# Enable forwarded headers for reverse proxy (nginx) to detect correct base URL
server.forward-headers-strategy=framework
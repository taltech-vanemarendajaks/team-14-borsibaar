openapi: 3.0.3
info:
  title: Borsibaar API
  version: 1.0.0

paths:
  /account:
    get:
      tags:
        - account
      summary: Get account balances
      operationId: getUser
      responses:
        200:
          description: Returned user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/currentUser'
  /account/onboarding:
    post:
      tags:
        - account
      summary: Onboard user
      operationId: onboardUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/onboardingRequest'
      responses:
        200:
          description: User onboarded
  /login/success:
    get:
      tags:
        - auth
      summary: Login success endpoint
      operationId: loginSuccess
      responses:
        200:
          description: Returned cookie
  /logout:
    post:
      tags:
        - auth
      summary: Logout user
      operationId: logoutUser
      responses:
        200:
          description: User logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logoutResponse'
  /users:
    get:
      tags:
        - user
      summary: Find organization users
      operationId: getOrganizationUsers
      responses:
        200:
          description: Got organization users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSummaryResponse'
  /bar-stations:
    get:
      tags:
        - barStation
      summary: Get all bar stations (admin only)
      operationId: getAllStations
      responses:
        200:
          description: Got all bar stations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BarStationResponse'
    post:
      tags:
        - barStation
      summary: Create new bar station (admin only)
      operationId: createStation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BarStationRequest'
      responses:
        201:
          description: Bar station created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BarStationResponse'
  /bar-stations/user:
    get:
      tags:
        - barStation
      summary: Get bar stations for current user
      operationId: getUserStations
      responses:
        200:
          description: Got user bar stations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/BarStationResponse'
  /bar-stations/{id}:
    get:
      tags:
        - barStation
      summary: Get bar station by ID
      operationId: getStationById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: Got bar station
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BarStationResponse'
    put:
      tags:
        - barStation
      summary: Update bar station (admin only)
      operationId: updateStation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BarStationRequest'
      responses:
        200:
          description: Bar station updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BarStationResponse'
    delete:
      tags:
        - barStation
      summary: Delete bar station (admin only)
      operationId: deleteStation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        204:
          description: Bar station deleted
  /categories:
    post:
      tags:
        - category
      summary: Create category
      operationId: createCategory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CategoryRequest'
      responses:
        201:
          description: Category created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
    get:
      tags:
        - category
      summary: Get all categories
      operationId: getAllCategories
      parameters:
        - name: organizationId
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: Got categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CategoryResponse'
  /categories/{id}:
    get:
      tags:
        - category
      summary: Get category by ID
      operationId: getCategoryById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: Got category
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryResponse'
    delete:
      tags:
        - category
      summary: Delete category
      operationId: deleteCategory
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        204:
          description: Category deleted
  /sales:
    post:
      tags:
        - sales
      summary: Process sale
      operationId: processSale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SaleRequest'
      responses:
        201:
          description: Sale processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SaleResponse'
  /products:
    post:
      tags:
        - product
      summary: Create product
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequest'
      responses:
        201:
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
  /products/{id}:
    get:
      tags:
        - product
      summary: Get product by ID
      operationId: getProductById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: Got product
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductResponse'
    delete:
      tags:
        - product
      summary: Delete product
      operationId: deleteProduct
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        204:
          description: Product deleted
  /organizations:
    post:
      tags:
        - organization
      summary: Create organization
      operationId: createOrganization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
      responses:
        201:
          description: Organization created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
    get:
      tags:
        - organization
      summary: Get all organizations
      operationId: getAllOrganizations
      responses:
        200:
          description: Got organizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrganizationResponse'
  /organizations/{id}:
    get:
      tags:
        - organization
      summary: Get organization by ID
      operationId: getOrganizationById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: Got organization
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
    put:
      tags:
        - organization
      summary: Update organization
      operationId: updateOrganization
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationRequest'
      responses:
        200:
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
  /inventory:
    get:
      tags:
        - inventory
      summary: Get organization inventory
      operationId: getOrganizationInventory
      parameters:
        - name: categoryId
          in: query
          required: false
          schema:
            type: integer
            format: int64
        - name: organizationId
          in: query
          required: false
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: Got inventory
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InventoryResponse'
  /inventory/product/{productId}:
    get:
      tags:
        - inventory
      summary: Get product inventory
      operationId: getProductInventory
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: Got product inventory
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryResponse'
  /inventory/add:
    post:
      tags:
        - inventory
      summary: Add stock
      operationId: addStock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddStockRequest'
      responses:
        201:
          description: Stock added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryResponse'
  /inventory/remove:
    post:
      tags:
        - inventory
      summary: Remove stock
      operationId: removeStock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveStockRequest'
      responses:
        200:
          description: Stock removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryResponse'
  /inventory/adjust:
    post:
      tags:
        - inventory
      summary: Adjust stock
      operationId: adjustStock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdjustStockRequest'
      responses:
        200:
          description: Stock adjusted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InventoryResponse'
  /inventory/product/{productId}/history:
    get:
      tags:
        - inventory
      summary: Get transaction history
      operationId: getTransactionHistory
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: Got transaction history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InventoryTransactionResponse'
  /inventory/sales-stats:
    get:
      tags:
        - inventory
      summary: Get user sales stats
      operationId: getUserSalesStats
      responses:
        200:
          description: Got user sales stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserSalesStatsResponse'
  /inventory/station-sales-stats:
    get:
      tags:
        - inventory
      summary: Get station sales stats
      operationId: getStationSalesStats
      responses:
        200:
          description: Got station sales stats
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StationSalesStatsResponse'
  /orders:
    post:
      tags:
        - order
      summary: Create order
      operationId: createOrder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        201:
          description: Order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'

    get:
      tags:
        - order
      summary: Get all orders
      operationId: getAllOrders
      responses:
        200:
          description: Orders fetched successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrderResponse'

  /orders/{id}:
    get:
      tags:
        - order
      summary: Get order by ID
      operationId: getOrderById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: Order fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        404:
          description: Order not found

    put:
      tags:
        - order
      summary: Update order
      operationId: updateOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderRequest'
      responses:
        200:
          description: Order updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderResponse'
        404:
          description: Order not found

    delete:
      tags:
        - order
      summary: Delete order
      operationId: deleteOrder
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        204:
          description: Order deleted
        404:
          description: Order not found

  /promos:
    post:
      tags:
        - promo
      summary: Create promo
      operationId: createPromo
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePromoRequest'
      responses:
        201:
          description: Promo created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoResponse'

    get:
      tags:
        - promo
      summary: Get all promos
      operationId: getAllPromos
      responses:
        200:
          description: Promos fetched successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PromoResponse'

  /promos/{id}:
    get:
      tags:
        - promo
      summary: Get promo by ID
      operationId: getPromoById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: Promo fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoResponse'
        404:
          description: Promo not found

    put:
      tags:
        - promo
      summary: Update promo
      operationId: updatePromo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePromoRequest'
      responses:
        200:
          description: Promo updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoResponse'
        404:
          description: Promo not found

    delete:
      tags:
        - promo
      summary: Delete promo
      operationId: deletePromo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        204:
          description: Promo deleted
        404:
          description: Promo not found

  /promo-items:
    post:
      tags:
        - promoItem
      summary: Create promo item
      operationId: createPromoItem
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePromoItemRequest'
      responses:
        201:
          description: Promo item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoItemResponse'

    get:
      tags:
        - promoItem
      summary: Get all promo items
      operationId: getAllPromoItems
      responses:
        200:
          description: Promo items fetched successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PromoItemResponse'

  /promo-items/{id}:
    get:
      tags:
        - promoItem
      summary: Get promo item by ID
      operationId: getPromoItemById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        200:
          description: Promo item fetched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoItemResponse'
        404:
          description: Promo item not found

    put:
      tags:
        - promoItem
      summary: Update promo item
      operationId: updatePromoItem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePromoItemRequest'
      responses:
        200:
          description: Promo item updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromoItemResponse'
        404:
          description: Promo item not found

    delete:
      tags:
        - promoItem
      summary: Delete promo item
      operationId: deletePromoItem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        204:
          description: Promo item deleted
        404:
          description: Promo item not found


components:
  schemas:
    CreateOrderRequest:
      type: object
      required:
        - desk
        - clientName
        - products
        - sessionId
        - state
        - total
      properties:
        desk:
          type: string
          maxLength: 100
        clientName:
          type: string
          maxLength: 255
        products:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/OrderProductRequest'
        userId:
          type: string
          format: uuid
          nullable: true
        sessionId:
          type: string
        state:
          $ref: '#/components/schemas/OrderState'
        total:
          type: number
          format: double

    UpdateOrderRequest:
      type: object
      properties:
        desk:
          type: string
          maxLength: 100
        clientName:
          type: string
          maxLength: 255
        products:
          type: array
          items:
            $ref: '#/components/schemas/OrderProductRequest'
        userId:
          type: string
          format: uuid
          nullable: true
        sessionId:
          type: string
        state:
          $ref: '#/components/schemas/OrderState'
        total:
          type: number
          format: double
        assignedWorkerId:
          type: string
          format: uuid

    OrderResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        desk:
          type: string
        clientName:
          type: string
        assignedWorkerId:
          type: string
          format: uuid
        assignedWorkerName:
          type: string
        products:
          type: array
          items:
            $ref: '#/components/schemas/OrderProductResponse'
        userId:
          type: string
          format: uuid
        sessionId:
          type: string
        state:
          $ref: '#/components/schemas/OrderState'
        total:
          type: number
          format: double
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    OrderState:
      type: string
      enum:
        - ORDER_CONFIRMED
        - IN_MAKING
        - READY_FOR_PICKUP
        - ORDER_COMPLETE
    OrderProductRequest:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: integer
          format: int64
        quantity:
          type: integer
          format: int32
          minimum: 1
    OrderProductResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        productId:
          type: integer
          format: int64
        productName:
          type: string
        quantity:
          type: integer
          format: int32
        unitPrice:
          type: number
          format: double
    CreatePromoRequest:
      type: object
      required:
        - organizationId
        - discountPercent
      properties:
        organizationId:
          type: integer
          format: int64
        discountPercent:
          type: number
          format: float
        name:
          type: string
          maxLength: 120
          nullable: true
        description:
          type: string
          maxLength: 500
          nullable: true
        isActive:
          type: boolean

    UpdatePromoRequest:
      type: object
      properties:
        organizationId:
          type: integer
          format: int64
        discountPercent:
          type: number
          format: float
        name:
          type: string
          maxLength: 120
          nullable: true
        description:
          type: string
          maxLength: 500
          nullable: true
        isActive:
          type: boolean

    PromoResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        organizationId:
          type: integer
          format: int64
        discountPercent:
          type: number
          format: float
        name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        promoItems:
          type: array
          items:
            $ref: '#/components/schemas/PromoItemResponse'

    CreatePromoItemRequest:
      type: object
      required:
        - promoId
        - productId
        - validFrom
        - validUntil
      properties:
        promoId:
          type: integer
          format: int64
        productId:
          type: integer
          format: int64
        validFrom:
          type: string
          format: date
        validUntil:
          type: string
          format: date

    UpdatePromoItemRequest:
      type: object
      properties:
        promoId:
          type: integer
          format: int64
        productId:
          type: integer
          format: int64
        validFrom:
          type: string
          format: date
        validUntil:
          type: string
          format: date

    PromoItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        promoId:
          type: integer
          format: int64
        productId:
          type: integer
          format: int64
        validFrom:
          type: string
          format: date
        validUntil:
          type: string
          format: date
    currentUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        role:
          type: string
        organizationId:
          type: integer
          format: int64
        needsOnboarding:
          type: boolean
    onboardingRequest:
      type: object
      properties:
        organizationId:
          type: integer
          format: int64
        acceptTerms:
          type: boolean
    logoutResponse:
      type: object
      properties:
        message:
          type: string
    SaleRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          minItems: 1
          maxItems: 100
          items:
            $ref: '#/components/schemas/SaleItemRequest'
        notes:
          type: string
        barStationId:
          type: integer
          format: int64
    SaleItemRequest:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: integer
          format: int64
        quantity:
          type: number
          minimum: 0
    RemoveStockRequest:
      type: object
      required:
        - productId
        - quantity
      properties:
        productId:
          type: integer
          format: int64
        quantity:
          type: number
          minimum: 0
        referenceId:
          type: string
        notes:
          type: string
    ProductRequest:
      type: object
      required:
        - name
        - currentPrice
        - minPrice
        - maxPrice
        - categoryId
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 1000
        currentPrice:
          type: number
          minimum: 0
          exclusiveMinimum: true
        minPrice:
          type: number
          minimum: 0

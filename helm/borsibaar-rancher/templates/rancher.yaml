apiVersion: v1
kind: Namespace
metadata:
  name: cattle-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: rancher
  namespace: cattle-system
---
apiVersion: v1
kind: Service
metadata:
  name: rancher
  namespace: cattle-system
spec:
  type: LoadBalancer
  selector:
    app: rancher
  ports:
    - name: http
      port: 90
      targetPort: 80
    - name: https
      port: 9443
      targetPort: 443
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: rancher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: rancher
    namespace: cattle-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rancher
  namespace: cattle-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rancher
  template:
    metadata:
      labels:
        app: rancher
    spec:
      serviceAccountName: rancher
      containers:
        - name: rancher
          image: rancher/rancher:v2.8.0
          ports:
            - containerPort: 80
            - containerPort: 443
          volumeMounts:
            - name: rancher-data
              mountPath: /var/lib/rancher
      volumes:
        - name: rancher-data
          persistentVolumeClaim:
            claimName: rancher-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rancher-pvc
  namespace: cattle-system
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  volumeName: rancher-pv
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: rancher-pv
  namespace: cattle-system
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  hostPath:
    path: /mnt/host/data/rancher
    type: DirectoryOrCreate
  persistentVolumeReclaimPolicy: Retain
